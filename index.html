<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件洗码工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #232830;
    --border-bright: #2e3640;
    --accent: #00e5a0;
    --accent-dim: #00b87d;
    --accent-glow: rgba(0,229,160,0.10);
    --warn: #f5a623;
    --warn-bg: rgba(245,166,35,0.08);
    --danger: #ff4d6a;
    --danger-bg: rgba(255,77,106,0.08);
    --text: #e2e8f0;
    --text-dim: #7a8494;
    --text-faint: #3d4452;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,160,0.013) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.013) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative; z-index:1;
    max-width: 800px;
    margin: 0 auto;
    padding: 44px 24px 80px;
  }

  .header { margin-bottom: 36px; }
  .header-row {
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 16px;
    flex-wrap: wrap; margin-bottom: 10px;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:36px; height:36px;
    border:1.5px solid var(--accent); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 14px var(--accent-glow);
    color: var(--accent);
  }
  h1 { font-family:var(--display); font-size:26px; font-weight:800; letter-spacing:-0.5px; }
  h1 span { color:var(--accent); }
  .subtitle { color:var(--text-dim); font-size:12px; margin-top:4px; }

  .privacy-badge {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--surface2); border:1px solid var(--border-bright);
    border-radius:100px; padding:6px 14px 6px 10px;
    font-size:11.5px; color:var(--accent); white-space:nowrap;
  }

  .privacy-banner {
    display:flex; align-items:flex-start; gap:10px;
    background:var(--accent-glow);
    border:1px solid rgba(0,229,160,0.18);
    border-radius:8px; padding:11px 14px; margin-top:16px;
    font-size:12px; color:rgba(0,229,160,0.9); line-height:1.65;
  }
  .privacy-banner svg { flex-shrink:0; margin-top:2px; }

  .drop-zone {
    border:1.5px dashed var(--border-bright);
    border-radius:12px; padding:52px 32px;
    text-align:center; cursor:pointer;
    background:var(--surface);
    position:relative; overflow:hidden;
    margin-bottom:20px;
    transition: border-color .2s, background .2s;
  }
  .drop-zone::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 50%, var(--accent-glow) 0%, transparent 70%);
    opacity:0; transition:opacity .3s;
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity:1; }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color:var(--accent); background:#0e1418;
  }
  .drop-zone.has-file {
    border-style:solid; border-color:var(--border-bright); padding:24px 28px;
  }

  .drop-icon {
    width:50px; height:50px; margin:0 auto 14px;
    background:var(--surface2); border:1px solid var(--border-bright);
    border-radius:12px; display:flex; align-items:center; justify-content:center;
    color:var(--text-dim);
  }
  .drop-title { font-family:var(--display); font-size:15px; font-weight:600; margin-bottom:5px; }
  .drop-sub { color:var(--text-dim); font-size:12px; margin-bottom:18px; }

  .btn-choose {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--surface2); border:1px solid var(--border-bright);
    color:var(--text); padding:9px 18px; border-radius:7px;
    cursor:pointer; font-family:var(--mono); font-size:12px;
    transition: all .15s;
  }
  .btn-choose:hover { border-color:var(--accent); color:var(--accent); }

  .file-card {
    display:none; align-items:center; gap:14px;
    text-align:left; width:100%; position:relative; z-index:1;
  }
  .file-card.visible { display:flex; }

  .f-icon {
    flex-shrink:0; width:50px; height:50px;
    background:var(--surface2); border:1px solid var(--border-bright);
    border-radius:10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase;
  }
  .f-meta { flex:1; min-width:0; }
  .f-name {
    font-size:13px; font-weight:500; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; margin-bottom:3px;
  }
  .f-size { color:var(--text-dim); font-size:11px; }

  .btn-clear {
    flex-shrink:0; background:none; border:1px solid var(--border);
    color:var(--text-dim); width:30px; height:30px; border-radius:6px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: all .15s;
  }
  .btn-clear:hover { border-color:var(--danger); color:var(--danger); }

  .alert {
    display:none; gap:10px; border-radius:8px; padding:12px 14px;
    font-size:12px; line-height:1.65; margin-bottom:14px;
  }
  .alert.visible { display:flex; }
  .alert svg { flex-shrink:0; margin-top:2px; }
  .alert-danger { background:var(--danger-bg); border:1px solid rgba(255,77,106,.25); color:var(--danger); }
  .alert-warn   { background:var(--warn-bg);   border:1px solid rgba(245,166,35,.25); color:var(--warn); }

  .controls { display:none; margin-bottom:16px; }
  .controls.visible { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

  .ctrl-label { font-size:11px; color:var(--text-dim); white-space:nowrap; }
  .tabs {
    display:flex; gap:3px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:7px; padding:3px;
  }
  .tab {
    padding:5px 12px; border-radius:5px; font-family:var(--mono);
    font-size:11px; font-weight:500; cursor:pointer;
    border:none; background:none; color:var(--text-dim); transition:all .15s;
  }
  .tab.active {
    background:var(--surface2); border:1px solid var(--border-bright); color:var(--accent);
  }

  .hash-panel { display:none; margin-bottom:18px; }
  .hash-panel.visible { display:block; }

  .section-label {
    font-size:11px; font-weight:600; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.12em;
    margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .hash-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media(max-width:520px){ .hash-grid{ grid-template-columns:1fr; } }

  .hash-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:13px;
  }
  .hash-box-head {
    font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:.12em; margin-bottom:7px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .hb-orig .hash-box-head { color:var(--text-dim); }
  .hb-new  .hash-box-head { color:var(--accent); }
  .hb-new  { border-color:rgba(0,229,160,.18); }

  .hash-val {
    font-size:10.5px; word-break:break-all; line-height:1.7;
    min-height:34px;
  }
  .hash-ph { color:var(--text-faint); font-style:italic; }

  .tag-changed {
    display:none; font-size:9px;
    background:var(--accent-glow); border:1px solid rgba(0,229,160,.3);
    color:var(--accent); padding:2px 7px; border-radius:100px;
    font-weight:600; letter-spacing:.05em;
  }

  .copy-btn {
    background:none; border:none; cursor:pointer;
    color:var(--text-dim); padding:2px 4px; border-radius:4px;
    transition:color .15s; display:inline-flex; align-items:center;
  }
  .copy-btn:hover { color:var(--accent); }

  .progress-wrap { display:none; height:3px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:14px; }
  .progress-wrap.visible { display:block; }
  .progress-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent-dim),var(--accent)); transition:width .3s; width:0; }
  .progress-bar.indeterminate {
    background:linear-gradient(90deg,var(--accent-dim),var(--accent),var(--accent-dim));
    background-size:200% 100%;
    width:100%;
    animation:shimmer 1.1s linear infinite;
  }
  @keyframes shimmer{ 0%{background-position:200% center} 100%{background-position:-200% center} }

  .status-bar { display:none; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:14px; }
  .status-bar.visible { display:flex; }
  .s-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; box-shadow:0 0 6px var(--accent); }
  .s-dot.pulse { animation:blink 1s ease infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }

  .action-row { display:none; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .action-row.visible { display:flex; }

  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 20px; border-radius:8px;
    font-family:var(--mono); font-size:13px; font-weight:500;
    cursor:pointer; border:none; transition:all .15s; white-space:nowrap;
  }
  .btn:disabled { opacity:.35; cursor:not-allowed; pointer-events:none; }

  .btn-primary {
    background:var(--accent); color:#000;
    box-shadow:0 0 18px rgba(0,229,160,.2);
  }
  .btn-primary:hover {
    background:#00ffb3; box-shadow:0 0 28px rgba(0,229,160,.35); transform:translateY(-1px);
  }
  .btn-secondary {
    background:var(--surface2); border:1px solid var(--border-bright); color:var(--text);
  }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

  @keyframes spin{ to{transform:rotate(360deg)} }
  .spin { animation:spin .7s linear infinite; display:inline-block; }

  .save-section {
    display:none; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:18px; margin-bottom:20px;
  }
  .save-section.visible { display:block; }

  .save-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }

  .path-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .path-label { font-size:12px; color:var(--text-dim); white-space:nowrap; }
  .path-input {
    flex:1; min-width:160px; background:var(--surface2);
    border:1px solid var(--border-bright); border-radius:6px;
    padding:8px 12px; color:var(--text); font-family:var(--mono); font-size:12px; outline:none;
    transition:border-color .15s;
  }
  .path-input:focus { border-color:var(--accent); }
  .path-input::placeholder { color:var(--text-faint); }

  .footer {
    margin-top:44px; padding-top:18px; border-top:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; flex-wrap:wrap;
  }
  .footer-text { font-size:11px; color:var(--text-faint); }
  .footer-badge { font-size:11px; color:var(--text-faint); display:flex; align-items:center; gap:5px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-row">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
        <div>
          <h1>文件<span>洗码</span>工具</h1>
          <div class="subtitle">修改文件哈希值，支持图片 / 音频 / 视频等媒体文件</div>
        </div>
      </div>
      <div class="privacy-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        纯本地运行 · 零数据上传
      </div>
    </div>
    <div class="privacy-banner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      🔐 <strong style="margin:0 3px">我们保护您的隐私</strong>——文件操作全程在您的设备上进行，不会上传任何数据。所有哈希计算与文件修改均由本地浏览器完成，无任何网络请求。
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div id="dropPrompt">
      <div class="drop-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-title">拖动文件到此处</div>
      <div class="drop-sub">支持任意格式，将自动判断是否可洗码</div>
      <button class="btn-choose" onclick="document.getElementById('fileInput').click()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        选择文件
      </button>
    </div>

    <div class="file-card" id="fileCard">
      <div class="f-icon" id="fIcon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="f-meta">
        <div class="f-name" id="fName"></div>
        <div class="f-size" id="fSize"></div>
      </div>
      <button class="btn-clear" id="clearBtn" title="移除文件">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <input type="file" id="fileInput" style="display:none">

  <div class="alert alert-danger" id="alertDanger">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="alertDangerMsg"></span>
  </div>

  <div class="alert alert-warn" id="alertWarn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span id="alertWarnMsg"></span>
  </div>

  <div class="controls" id="controls">
    <span class="ctrl-label">哈希算法：</span>
    <div class="tabs" id="algoTabs">
      <button class="tab active" data-algo="SHA-1">SHA-1</button>
      <button class="tab" data-algo="SHA-256">SHA-256</button>
      <button class="tab" data-algo="SHA-512">SHA-512</button>
    </div>
  </div>

  <div class="hash-panel" id="hashPanel">
    <div class="section-label">哈希对比</div>
    <div class="hash-grid">
      <div class="hash-box hb-orig">
        <div class="hash-box-head">
          原始哈希
          <button class="copy-btn" id="copyOrig" title="复制">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
        <div class="hash-val" id="hashOrig"><span class="hash-ph">计算中…</span></div>
      </div>
      <div class="hash-box hb-new">
        <div class="hash-box-head">
          洗码后哈希
          <div style="display:flex;align-items:center;gap:6px">
            <span class="tag-changed" id="tagChanged">✓ 已变更</span>
            <button class="copy-btn" id="copyNew" title="复制">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="hash-val" id="hashNew"><span class="hash-ph">洗码后显示</span></div>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="s-dot" id="sDot"></div>
    <span id="statusMsg"></span>
  </div>

  <div class="action-row" id="actionRow">
    <button class="btn btn-primary" id="washBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 12a11.05 11.05 0 0 0-22 0zm-5 7a3 3 0 0 1-6 0v-7"/>
      </svg>
      开始洗码
    </button>
    <button class="btn btn-secondary" id="againBtn" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.36"/>
      </svg>
      再次洗码
    </button>
  </div>

  <div class="save-section" id="saveSection">
    <div class="section-label">保存文件</div>
    <div class="save-row">
      <button class="btn btn-primary" id="savePickBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        手动选择保存位置
      </button>
      <button class="btn btn-secondary" id="saveQuickBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        快速下载
      </button>
    </div>
    <div class="path-row">
      <span class="path-label">快速下载文件名前缀：</span>
      <input class="path-input" id="prefixInput" type="text" placeholder="washed_" value="washed_">
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">洗码原理：在文件末尾追加随机字节，改变哈希值而不破坏文件内容（适用类型）</div>
    <div class="footer-badge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      本地运行 · 安全可靠
    </div>
  </div>
</div>

<script>
// ── File type classification ──────────────────────────────────
const TEXT_EXTS = new Set([
  'txt','csv','json','xml','html','htm','css','js','ts','jsx','tsx',
  'py','java','c','cpp','h','cs','rb','go','rs','swift','kt','php',
  'sh','bash','zsh','yaml','yml','toml','ini','cfg','conf','md',
  'markdown','log','sql','vue','sass','scss','less','bat','ps1',
  'r','m','tex','rst','env','gitignore','dockerfile','makefile',
  'lock','editorconfig','babelrc','eslintrc','prettierrc'
]);

const RISKY_EXTS = new Set([
  'pdf','docx','doc','xlsx','xls','pptx','ppt',
  'zip','rar','7z','gz','tar','bz2','xz',
  'exe','dll','apk','ipa','dmg','pkg','deb','rpm','msi',
  'jar','war','ear','epub','odt','ods','odp','iso'
]);

// ── State ─────────────────────────────────────────────────────
let gFile      = null;
let gModBuf    = null;   // ArrayBuffer of washed bytes
let gOrigHash  = '';
let gNewHash   = '';
let gAlgo      = 'SHA-1'; // exact string for SubtleCrypto

// ── Helpers ───────────────────────────────────────────────────
const byId = id => document.getElementById(id);

function getExt(name) {
  const parts = name.toLowerCase().split('.');
  return parts.length > 1 ? parts[parts.length - 1] : '';
}

function classify(ext) {
  if (!ext)              return 'safe';
  if (TEXT_EXTS.has(ext)) return 'text';
  if (RISKY_EXTS.has(ext)) return 'risky';
  return 'safe';
}

function fmtSize(b) {
  if (b < 1024)        return b + ' B';
  if (b < 1048576)     return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824)  return (b / 1048576).toFixed(2) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}

// ── SubtleCrypto hash ─────────────────────────────────────────
// gAlgo is ALREADY the correct format: 'SHA-1', 'SHA-256', 'SHA-512'
async function hashBuf(buffer) {
  const digest = await crypto.subtle.digest(gAlgo, buffer);
  return Array.from(new Uint8Array(digest))
               .map(b => b.toString(16).padStart(2, '0'))
               .join('');
}

// ── Wash: append random bytes ─────────────────────────────────
function makeWashedBuffer(original) {
  const extraLen = 16 + Math.floor(Math.random() * 49); // 16–64 bytes
  const rand = new Uint8Array(extraLen);
  crypto.getRandomValues(rand);
  const out = new Uint8Array(original.byteLength + extraLen);
  out.set(new Uint8Array(original), 0);
  out.set(rand, original.byteLength);
  return out.buffer;
}

// ── UI helpers ────────────────────────────────────────────────
function setStatus(msg, pulse) {
  byId('statusBar').classList.add('visible');
  byId('statusMsg').textContent = msg;
  byId('sDot').className = 's-dot' + (pulse ? ' pulse' : '');
}
function clearStatus() { byId('statusBar').classList.remove('visible'); }

function startProgress() {
  byId('progressWrap').classList.add('visible');
  byId('progressBar').className = 'progress-bar indeterminate';
}
function endProgress() {
  byId('progressBar').className = 'progress-bar';
  byId('progressBar').style.width = '100%';
  setTimeout(() => byId('progressWrap').classList.remove('visible'), 500);
}

function renderHashEl(el, hex, colored) {
  el.innerHTML = colored
    ? `<span style="color:var(--accent);word-break:break-all;line-height:1.7">${hex}</span>`
    : `<span style="word-break:break-all;line-height:1.7">${hex}</span>`;
}

// ── Load file ─────────────────────────────────────────────────
async function loadFile(f) {
  gFile    = f;
  gModBuf  = null;
  gOrigHash = '';
  gNewHash  = '';

  const ext    = getExt(f.name);
  const status = classify(ext);

  // File card
  byId('dropZone').classList.add('has-file');
  byId('dropPrompt').style.display = 'none';
  byId('fileCard').classList.add('visible');
  byId('fName').textContent = f.name;
  byId('fSize').textContent = fmtSize(f.size) + (ext ? ' · ' + ext.toUpperCase() : '');
  byId('fIcon').innerHTML   = ext
    ? `<span style="font-size:11px;font-weight:700;color:var(--accent)">${ext.toUpperCase()}</span>`
    : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

  // Reset UI
  byId('alertDanger').classList.remove('visible');
  byId('alertWarn').classList.remove('visible');
  byId('saveSection').classList.remove('visible');
  byId('hashPanel').classList.remove('visible');
  byId('controls').classList.remove('visible');
  byId('actionRow').classList.remove('visible');
  byId('tagChanged').style.display = 'none';
  byId('hashOrig').innerHTML = '<span class="hash-ph">计算中…</span>';
  byId('hashNew').innerHTML  = '<span class="hash-ph">洗码后显示</span>';
  byId('washBtn').style.display  = '';
  byId('againBtn').style.display = 'none';
  byId('washBtn').disabled = false;
  byId('washBtn').innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 12a11.05 11.05 0 0 0-22 0zm-5 7a3 3 0 0 1-6 0v-7"/></svg> 开始洗码`;
  clearStatus();

  // TEXT → refuse
  if (status === 'text') {
    byId('alertDanger').classList.add('visible');
    byId('alertDangerMsg').innerHTML =
      `<strong>不支持洗码 .${ext} 文件</strong><br>` +
      `文本类文件（.txt、.json、.csv、代码文件等）末尾追加二进制数据后内容损坏，无法正常打开，因此不执行洗码。<br>` +
      `<span style="opacity:.7">支持类型：JPG/PNG/GIF/WEBP/MP4/MKV/MP3/FLAC 等媒体文件。</span>`;
    return;
  }

  // RISKY → warn
  if (status === 'risky') {
    byId('alertWarn').classList.add('visible');
    byId('alertWarnMsg').innerHTML =
      `<strong>⚠ .${ext} 文件存在兼容性风险</strong><br>` +
      `此格式对文件结构有严格要求，洗码后部分情况可能无法正常打开（如 ZIP/EXE）。建议先备份原文件。`;
  }

  byId('controls').classList.add('visible');
  byId('hashPanel').classList.add('visible');
  byId('actionRow').classList.add('visible');

  // Compute original hash
  startProgress();
  setStatus('正在计算原始哈希…', true);
  try {
    const buf = await gFile.arrayBuffer();
    gOrigHash = await hashBuf(buf);
    renderHashEl(byId('hashOrig'), gOrigHash, false);
    endProgress();
    clearStatus();
  } catch (e) {
    endProgress();
    setStatus('哈希计算出错，请重试');
    console.error(e);
  }
}

// ── Drag/drop & input ─────────────────────────────────────────
const dropZone = byId('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
dropZone.addEventListener('click', e => {
  if (e.target.closest('#clearBtn') || e.target.closest('.btn-choose')) return;
  if (!gFile) byId('fileInput').click();
});
byId('fileInput').addEventListener('change', () => {
  if (byId('fileInput').files[0]) loadFile(byId('fileInput').files[0]);
  byId('fileInput').value = '';
});
byId('clearBtn').addEventListener('click', e => { e.stopPropagation(); resetAll(); });

// ── Algorithm tabs ────────────────────────────────────────────
byId('algoTabs').addEventListener('click', async e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  gAlgo = tab.dataset.algo; // 'SHA-1' | 'SHA-256' | 'SHA-512'
  if (gFile && classify(getExt(gFile.name)) !== 'text') {
    // Recompute both hashes with new algo
    startProgress();
    try {
      const buf = await gFile.arrayBuffer();
      gOrigHash = await hashBuf(buf);
      renderHashEl(byId('hashOrig'), gOrigHash, false);
      if (gModBuf) {
        gNewHash = await hashBuf(gModBuf);
        renderHashEl(byId('hashNew'), gNewHash, true);
        byId('tagChanged').style.display = gOrigHash !== gNewHash ? '' : 'none';
      }
      endProgress();
    } catch(e) { endProgress(); console.error(e); }
  }
});

// ── Wash ──────────────────────────────────────────────────────
async function doWash() {
  if (!gFile) return;
  byId('washBtn').disabled = true;
  byId('washBtn').innerHTML = `<span class="spin" style="font-style:normal">◌</span> 洗码中…`;
  byId('againBtn').disabled = true;

  startProgress();
  setStatus('正在修改文件数据并计算新哈希…', true);

  // Let UI repaint
  await new Promise(r => setTimeout(r, 40));

  try {
    const origBuf = await gFile.arrayBuffer();
    gModBuf   = makeWashedBuffer(origBuf);
    gOrigHash = await hashBuf(origBuf);
    gNewHash  = await hashBuf(gModBuf);

    renderHashEl(byId('hashOrig'), gOrigHash, false);
    renderHashEl(byId('hashNew'), gNewHash, true);
    byId('tagChanged').style.display = gOrigHash !== gNewHash ? '' : 'none';

    endProgress();
    setStatus('✓ 洗码完成！哈希已成功变更，请保存文件。');

    byId('washBtn').style.display  = 'none';
    byId('againBtn').style.display = '';
    byId('againBtn').disabled = false;
    byId('saveSection').classList.add('visible');
  } catch (err) {
    console.error('Wash failed:', err);
    endProgress();
    setStatus('洗码失败：' + err.message);
    byId('washBtn').disabled = false;
    byId('washBtn').innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 12a11.05 11.05 0 0 0-22 0zm-5 7a3 3 0 0 1-6 0v-7"/></svg> 开始洗码`;
    byId('againBtn').disabled = false;
  }
}

byId('washBtn').addEventListener('click', doWash);
byId('againBtn').addEventListener('click', doWash);

// ── Save ──────────────────────────────────────────────────────
byId('savePickBtn').addEventListener('click', async () => {
  if (!gModBuf || !gFile) return;
  const ext  = getExt(gFile.name);
  const base = gFile.name.slice(0, gFile.name.lastIndexOf('.')) || gFile.name;
  const name = base + '_washed' + (ext ? '.' + ext : '');

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: name,
        types: [{ description: '文件', accept: { '*/*': ext ? ['.' + ext] : ['.bin'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(gModBuf);
      await writable.close();
      setStatus('✓ 文件已保存至您选择的位置。');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      // fall through to download fallback
    }
  }
  download(name);
  setStatus('✓ 文件已开始下载（浏览器不支持文件选择器，已自动触发下载）。');
});

byId('saveQuickBtn').addEventListener('click', () => {
  if (!gModBuf || !gFile) return;
  const prefix = byId('prefixInput').value.trim() || 'washed_';
  download(prefix + gFile.name);
  setStatus('✓ 文件已开始下载。');
});

function download(name) {
  const blob = new Blob([gModBuf], { type: gFile.type || 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 2000);
}

// ── Copy ──────────────────────────────────────────────────────
byId('copyOrig').addEventListener('click', () => {
  if (gOrigHash) navigator.clipboard.writeText(gOrigHash).then(() => setStatus('已复制原始哈希'));
});
byId('copyNew').addEventListener('click', () => {
  if (gNewHash) navigator.clipboard.writeText(gNewHash).then(() => setStatus('已复制洗码后哈希'));
});

// ── Reset ─────────────────────────────────────────────────────
function resetAll() {
  gFile = null; gModBuf = null; gOrigHash = ''; gNewHash = '';

  byId('dropZone').classList.remove('has-file');
  byId('dropPrompt').style.display = '';
  byId('fileCard').classList.remove('visible');
  byId('alertDanger').classList.remove('visible');
  byId('alertWarn').classList.remove('visible');
  byId('controls').classList.remove('visible');
  byId('hashPanel').classList.remove('visible');
  byId('actionRow').classList.remove('visible');
  byId('saveSection').classList.remove('visible');
  byId('progressWrap').classList.remove('visible');
  byId('tagChanged').style.display = 'none';
  byId('hashOrig').innerHTML = '<span class="hash-ph">计算中…</span>';
  byId('hashNew').innerHTML  = '<span class="hash-ph">洗码后显示</span>';
  byId('washBtn').style.display  = '';
  byId('againBtn').style.display = 'none';
  byId('washBtn').disabled = false;
  byId('washBtn').innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 12a11.05 11.05 0 0 0-22 0zm-5 7a3 3 0 0 1-6 0v-7"/></svg> 开始洗码`;
  clearStatus();
}
</script>
</body>
</html>
